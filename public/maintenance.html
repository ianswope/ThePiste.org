<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="60">
    <title>Back soon · ThePiste</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh; display: grid; place-items: center;
            font-family: ui-sans-serif, system-ui, sans-serif;
            background: #F1F3F6; color: #131B29; padding: 24px;
        }
        .card {
            max-width: 460px; width: 100%; background: #fff; border: 1px solid #DFE4EA;
            border-radius: 16px; padding: 40px 34px; text-align: center;
            box-shadow: 0 10px 24px -12px rgba(19,27,41,.22); position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, #E84B5C 0%, #E84B5C 38%, #D5DBE3 50%, #2DB95E 62%, #2DB95E 100%);
        }
        .brand { font-family: ui-monospace, monospace; font-weight: 700; letter-spacing: .22em; font-size: 13px; color: #66707F; }
        .sword { font-size: 42px; margin: 18px 0 6px; }
        h1 { font-size: 22px; margin: 0 0 10px; font-weight: 800; }
        p { color: #66707F; font-size: 15px; line-height: 1.65; margin: 0; }
    </style>
</head>
<body>
    <main class="card">
        <div class="brand">THEPISTE</div>
        <div class="sword">⚔️</div>
        <h1>We're working on some things</h1>
        <p>ThePiste is taking a short break while we fix something up.
           Your plans and results are safe. This page refreshes itself, so just hang tight or check back in a few minutes.</p>
    </main>
</body>
</html>
